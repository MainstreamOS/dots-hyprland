# /etc/scrolloverview.conf
# Configuration for /usr/local/lib/scrolloverview/rebuild.sh — the pacman
# hook that rebuilds the hyprland-scroll-overview plugin on every
# `hyprland` install/upgrade.
#
# All settings are optional. The defaults give zero-touch operation:
# rebuild.sh tries the previously-known-good commit, then the upstream
# hyprpm.toml pin matching the running Hyprland commit, then matching
# version tags, then `main`, and finally walks history backward until a
# buildable commit is found. The first working ref is cached for the
# next run.
#
# Sourced as bash — uncomment any line below to override.

# Source repo for hyprland-scroll-overview. Defaults to the MainstreamOS
# fork because it carries the wallpaper_path / gdk-pixbuf / CPU-blur
# patches the dots-hyprland install assumes are present.
#SCROLLOVERVIEW_REPO="https://github.com/MainstreamOS/hyprland-scroll-overview"

# Default branch the rebuild script tries last in its fallback chain and
# walks backwards through. Defaults to "mainstream" to match the
# MainstreamOS fork. Override to "main" if pointing SCROLLOVERVIEW_REPO
# at upstream yayuuu/hyprland-scroll-overview directly.
#SCROLLOVERVIEW_DEFAULT_BRANCH="mainstream"

# Pin to an explicit ref (tag, branch, or commit SHA). When set, the
# auto-detect / fallback chain is skipped and a build failure is fatal.
# Useful when you want reproducible builds across machines, or to lock
# to a known-good commit while upstream is broken.
#
# caec103: first commit that exposes the V2 dispatcher to Lua via
# addLuaFunction, so `hl.plugin.scrolloverview.overview("toggle")`
# is reachable from Lua-mode keybinds.
SCROLLOVERVIEW_REF="caec1036763516ab42ba4b28b4811e5ec11c245f"

# Cap on how many commits the auto-walk-back will try after primary
# candidates fail. Each attempt is a clean build (~10 sec on modern
# hardware). Increase for very stale systems, decrease to bail sooner.
#WALK_DEPTH=50
