<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <!-- Disable sub-pixel anti-aliasing globally (preserves grayscale look). -->
    <match target="font">
        <edit name="rgba" mode="assign">
            <const>none</const>
        </edit>
    </match>

    <!-- Route generic "sans" requests to Google Sans Flex. Covers pango/cairo
         consumers that hardcode a family like "Sans 7.0" (e.g. gnome-disks'
         VolumeGrid labels), GTK fallback chains, Hyprland's built-in text,
         and any app reading CSS system-ui/sans-serif. -->
    <match target="pattern">
        <test name="family" qual="any"><string>sans-serif</string></test>
        <edit name="family" mode="prepend" binding="same">
            <string>Google Sans Flex</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="family" qual="any"><string>Sans</string></test>
        <edit name="family" mode="prepend" binding="same">
            <string>Google Sans Flex</string>
        </edit>
    </match>
    <match target="pattern">
        <test name="family" qual="any"><string>system-ui</string></test>
        <edit name="family" mode="prepend" binding="same">
            <string>Google Sans Flex</string>
        </edit>
    </match>

    <!-- When the app ends up with Google Sans Flex at the default "regular"
         weight (80), upgrade to "medium" (100 → wght=500 on the variable
         font's wght axis). Keeps the rendered weight in step with the shell's
         UI default ("Google Sans Flex Medium 11 @opsz=11,wght=500") without
         clobbering apps that explicitly request light/bold/etc. -->
    <match target="font">
        <test name="family"><string>Google Sans Flex</string></test>
        <test name="weight" compare="eq"><const>regular</const></test>
        <edit name="weight" mode="assign">
            <const>medium</const>
        </edit>
    </match>
</fontconfig>
