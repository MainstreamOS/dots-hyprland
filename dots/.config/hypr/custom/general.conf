# hyprlang noerror false

# scrolloverview plugin load directive. The .so lives in
# ~/.local/share/hyprland/plugins/ — installed by
# sdata/subcmd-install/3.files.sh (./install.sh) or pre-shipped via
# /etc/skel from archiso. $HOME is expanded by Hyprlang at parse time
# so the same line works for liveuser, the Calamares-created user, or
# any manual-install user without per-user templating.
#
# Active by default — the niri-style overview is wired to Super+O and
# the bar's top-left hot corner.
#
# Without this directive, Hyprland still parses the
# `plugin { scrolloverview { ... } }` block below and tries to
# interpret its inner keys as builtin configs — which fails noisily
# for matches like `gesture_distance = 300` against
# `workspace_swipe_min_finger_count`.
plugin = $HOME/.local/share/hyprland/plugins/scrolloverview.so

# hyprbars plugin load directive. Same install path as scrolloverview
# (~/.local/share/hyprland/plugins/) and same parse-time $HOME expansion.
#
# Commented out by default — the Title Bars toggle in
# Settings → Interface → Decorations uncomments / re-comments this line
# via its self-healing path. The dots ship the
# `plugin { hyprbars { ... } }` settings block below uncommented so the
# title-bar styling is already configured the moment the user flips the
# toggle on; until then, Hyprland silently ignores those keys (they
# don't collide with any builtin name the way scrolloverview's
# `gesture_distance` did).
# plugin = $HOME/.local/share/hyprland/plugins/hyprbars.so

plugin {
    hyprbars {
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
	col.text = rgba(00000000)
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        hyprbars-button = rgba(49454e55), 13, 󰖭, hyprctl dispatch killactive, rgb(ffffff)
        hyprbars-button = rgba(49454e55), 13, 󰖯, hyprctl dispatch fullscreen 1, rgb(ffffff)
        hyprbars-button = rgba(49454e55), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special, rgb(ffffff)
    }
}

plugin {
    scrolloverview {
        gesture_distance = 300 # how far is the "max" for the gesture
        scale = 0.5 # preferred overview scale
        workspace_gap = 100
        wallpaper = 2 # 0: global only, 1: per-workspace only, 2: both
        # Path to the wallpaper image rendered as the overview backdrop.
        # Defaults to the bundled end-4 default wallpaper. switchwall.sh
        # rewrites this line on every wallpaper change and runs `hyprctl
        # reload`, so the plugin tracks whatever Quickshell is showing.
        # $HOME is expanded by Hyprlang at parse time; gdk-pixbuf does not
        # expand ~ so a tilde here would fail to load.
        wallpaper_path = $HOME/.config/quickshell/ii/assets/images/default_wallpaper.png
        blur = true # blur only the main overview wallpaper

        shadow {
            enabled = true
            range = 50
            render_power = 3
            color = rgba(1a1a1aee)
        }
    }
}
