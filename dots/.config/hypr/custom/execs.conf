# hyprlang noerror false
# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Input method
# exec-once = fcitx5

exec-once = ~/.config/hypr/custom/scripts/bluetooth-autoconnect.sh

# Hyprland 0.55 scrolloverview load-race workaround — see the script
# header for the full story. Logs to ~/.local/state/scrolloverview-power-cycle.log.
exec-once = ~/.config/hypr/custom/scripts/scrolloverview-power-cycle.sh
